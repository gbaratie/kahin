# Build et déploiement Admin + Participant vers GitHub Pages.
# Admin à la racine, Participant sous /participant (ou $BASE_PATH/participant).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Pour que les variables d'environnement GitHub (NEXT_PUBLIC_API_URL, etc.)
    # soient disponibles pendant le build Next.js.
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages (domain, application, infrastructure)
        run: |
          npm run build -w @kahin/qcm-domain
          npm run build -w @kahin/qcm-application
          npm run build -w @kahin/qcm-infrastructure

      # Base path pour GitHub Pages : variable repo ou défaut = /nom-du-repo
      - name: Set base path for GitHub Pages
        id: basepath
        run: |
          if [ -n "${{ vars.NEXT_PUBLIC_BASE_PATH }}" ]; then
            echo "admin=${{ vars.NEXT_PUBLIC_BASE_PATH }}" >> $GITHUB_OUTPUT
            echo "participant=${{ vars.NEXT_PUBLIC_BASE_PATH }}/participant" >> $GITHUB_OUTPUT
          else
            echo "admin=/${{ github.event.repository.name }}" >> $GITHUB_OUTPUT
            echo "participant=/${{ github.event.repository.name }}/participant" >> $GITHUB_OUTPUT
          fi

      - name: Build Admin app
        run: npm run build -w admin
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.basepath.outputs.admin }}

      - name: Build Participant app
        run: npm run build -w participant
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.basepath.outputs.participant }}

      - name: Merge Admin + Participant for Pages
        run: |
          mkdir -p deploy/participant
          cp -r apps/admin/out/* deploy/
          cp -r apps/participant/out/* deploy/participant/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'deploy'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
