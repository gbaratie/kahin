# Build et déploiement du front unifié vers GitHub Pages.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages (domain, application, infrastructure)
        run: |
          npm run build -w @kahin/qcm-domain
          npm run build -w @kahin/qcm-application
          npm run build -w @kahin/qcm-infrastructure

      - name: Set base path for GitHub Pages
        id: basepath
        run: |
          BASE="${{ vars.NEXT_PUBLIC_BASE_PATH || env.NEXT_PUBLIC_BASE_PATH }}"
          if [ -n "$BASE" ]; then
            echo "base_path=$BASE" >> $GITHUB_OUTPUT
          else
            echo "base_path=/${{ github.event.repository.name }}" >> $GITHUB_OUTPUT
          fi

      - name: Build front app
        run: npm run build -w front
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.basepath.outputs.base_path }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || env.NEXT_PUBLIC_API_URL }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'apps/front/out'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
