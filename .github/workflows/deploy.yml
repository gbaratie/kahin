# Build et déploiement Admin + Participant vers GitHub Pages.
# Admin à la racine, Participant sous /participant (ou $BASE_PATH/participant).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages (domain, application, infrastructure)
        run: |
          npm run build -w @kahin/qcm-domain
          npm run build -w @kahin/qcm-application
          npm run build -w @kahin/qcm-infrastructure

      - name: Build Admin app
        run: npm run build -w admin
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH || '' }}

      - name: Build Participant app
        run: npm run build -w participant
        env:
          # Sous-chemin participant (ex. /participant ou /kahin/participant)
          NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH || '' }}/participant

      - name: Merge Admin + Participant for Pages
        run: |
          mkdir -p deploy/participant
          cp -r apps/admin/out/* deploy/
          cp -r apps/participant/out/* deploy/participant/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'deploy'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
